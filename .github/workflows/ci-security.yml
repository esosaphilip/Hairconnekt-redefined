name: CI Security

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  backend_quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/backend/package-lock.json

      - name: Install backend deps
        run: npm ci

      - name: Type-check backend
        run: npm run type-check

      - name: Build backend
        run: npm run build

  mobile_quality:
    name: Mobile Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install mobile deps
        run: npm ci

      - name: Type-check mobile
        run: npm run type-check

  admin_quality:
    name: Admin Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install admin deps
        run: npm ci

      - name: Lint admin
        run: npm run lint

      - name: Build admin
        run: npm run build

  secret_scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency_audit:
    name: Dependency Audit (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            working_directory: packages/backend
            lockfile: packages/backend/package-lock.json
          - name: admin
            working_directory: apps/admin
            lockfile: apps/admin/package-lock.json
          - name: mobile
            working_directory: apps/mobile
            lockfile: apps/mobile/package-lock.json
    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

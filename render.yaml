services:
  - type: web
    name: hairconnekt-api-staging
    runtime: node
    branch: develop
    region: frankfurt
    rootDir: packages/backend
    buildCommand: npm ci && npm run build && npm run migration:run
    startCommand: npm run start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    plan: starter
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: NODE_ENV
        value: staging
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES
        sync: false
      - key: JWT_REFRESH_EXPIRES
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: OTP_EXPIRES_MINUTES
        sync: false
      - key: OTP_DEV_MODE
        sync: false
      - key: BCRYPT_ROUNDS
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: GEOCODING_BASE_URL
        sync: false
      - key: GEOCODING_USER_AGENT
        sync: false
